name: example
description: "Example app demonstrating flutter_go_router_extension usage."
publish_to: 'none'

version: 1.0.2+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.0.1
  
  flutter_go_router_extension:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  go_router_builder: ^4.2.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
